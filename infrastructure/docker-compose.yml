services:
  ### CRIMINAL INFORMATION SERVICE ###
  criminal-info-postgres:
    image: postgres:latest
    container_name: criminal-info-postgres
    environment:
      POSTGRES_USER: postgresadmin
      POSTGRES_PASSWORD: postgresadmin
      POSTGRES_DB: CRIMINAL_INFO
    ports:
      - "10000:5432"
    volumes:
      - criminal-info-postgres-data:/var/lib/postgresql/data
      - ../migration/postgres/01-criminal-info-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ../migration/postgres/02-criminal-info-seeding.sql:/docker-entrypoint-initdb.d/02-seeding.sql
    networks:
      - tracknest-network
    
  criminal-info-minio:
    image: minio/minio
    container_name: criminal-info-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_VOLUMES: /mnt/data
      MINIO_OPTS: "--console-address :9001"
    ports:
      - "11000:9000"
      - "11001:9001"
    volumes:
      - criminal-info-minio-data:/mnt/data
    command: server --console-address ":9001"
    networks:
      - tracknest-network

  criminal-info-service:
    build:
      context: ../services/criminal-info-service
      dockerfile: Dockerfile
    ports:
      - "12000:12000"
    environment:
      SPRING_PROFILES_ACTIVE: container
    networks:
      - tracknest-network
    depends_on:
      - criminal-info-postgres
      - criminal-info-minio

  ### LOCATION TRACKING SERVICE ###
  location-tracking-postgres:
    image: postgres:latest
    container_name: location-tracking-postgres
    environment:
      POSTGRES_USER: postgresadmin
      POSTGRES_PASSWORD: postgresadmin
      POSTGRES_DB: LOCATION_TRACKING
    ports:
      - "13000:5432"
    volumes:
      - location-tracking-postgres-data:/var/lib/postgresql/data
      - ../migration/postgres/01-location-tracking-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ../migration/postgres/02-location-tracking-seeding.sql:/docker-entrypoint-initdb.d/02-seeding.sql
    networks:
      - tracknest-network

  location-tracking-service:
    build:
      context: ../services/location-tracking-service
      dockerfile: Dockerfile
    ports:
      - "15000:15000"
    networks:
      - tracknest-network
    environment:
      ACTIVE_ENV: container
    depends_on:
      - location-tracking-postgres
      - location-tracking-minio

  ### IAM SERVICE ###
  keycloak-postgres:
    image: postgres:latest
    container_name: keycloak-postgres
    environment:
      POSTGRES_USER: postgresadmin
      POSTGRES_PASSWORD: postgresadmin
      POSTGRES_DB: KEYCLOAK
    ports:
      - "8000:5432"
    volumes:
      - keycloak-postgres-data:/var/lib/postgresql/data
    networks:
      - tracknest-network

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: keycloak
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL_HOST: keycloak-postgres
      KC_DB_URL_PORT: 5432
      KC_DB_URL_DATABASE: KEYCLOAK
      KC_DB_USERNAME: postgresadmin
      KC_DB_PASSWORD: postgresadmin
    command: start-dev
    networks:
      - tracknest-network
    depends_on:
      - keycloak-postgres

  ### KAFKA CLUSTER ###
  controller-1:
    image: apache/kafka:latest
    container_name: controller-1
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: controller
      KAFKA_LISTENERS: CONTROLLER://:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@controller-1:9093,2@controller-2:9093,3@controller-3:9093
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

  controller-2:
    image: apache/kafka:latest
    container_name: controller-2
    environment:
      KAFKA_NODE_ID: 2
      KAFKA_PROCESS_ROLES: controller
      KAFKA_LISTENERS: CONTROLLER://:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@controller-1:9093,2@controller-2:9093,3@controller-3:9093
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

  controller-3:
    image: apache/kafka:latest
    container_name: controller-3
    environment:
      KAFKA_NODE_ID: 3
      KAFKA_PROCESS_ROLES: controller
      KAFKA_LISTENERS: CONTROLLER://:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@controller-1:9093,2@controller-2:9093,3@controller-3:9093
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

  broker-1:
    image: apache/kafka:latest
    container_name: broker-1
    ports:
      - 29092:9092
    environment:
      KAFKA_NODE_ID: 4
      KAFKA_PROCESS_ROLES: broker
      KAFKA_LISTENERS: 'PLAINTEXT://:19092,PLAINTEXT_HOST://:9092'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://broker-1:19092,PLAINTEXT_HOST://localhost:29092'
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@controller-1:9093,2@controller-2:9093,3@controller-3:9093
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    depends_on:
      - controller-1
      - controller-2
      - controller-3

  broker-2:
    image: apache/kafka:latest
    container_name: broker-2
    ports:
      - 39092:9092
    environment:
      KAFKA_NODE_ID: 5
      KAFKA_PROCESS_ROLES: broker
      KAFKA_LISTENERS: 'PLAINTEXT://:19092,PLAINTEXT_HOST://:9092'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://broker-2:19092,PLAINTEXT_HOST://localhost:39092'
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@controller-1:9093,2@controller-2:9093,3@controller-3:9093
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    depends_on:
      - controller-1
      - controller-2
      - controller-3

  broker-3:
    image: apache/kafka:latest
    container_name: broker-3
    ports:
      - 49092:9092
    environment:
      KAFKA_NODE_ID: 6
      KAFKA_PROCESS_ROLES: broker
      KAFKA_LISTENERS: 'PLAINTEXT://:19092,PLAINTEXT_HOST://:9092'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://broker-3:19092,PLAINTEXT_HOST://localhost:49092'
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@controller-1:9093,2@controller-2:9093,3@controller-3:9093
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    depends_on:
      - controller-1
      - controller-2
      - controller-3

volumes:
  criminal-info-minio-data:
  criminal-info-postgres-data:
  location-tracking-minio-data:
  location-tracking-postgres-data:
  keycloak-postgres-data:

networks:
  tracknest-network: