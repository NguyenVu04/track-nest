{{- if .Values.emergencyops.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: emergency-ops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: emergency-ops
  template:
    metadata:
      labels:
        app: emergency-ops
    spec:
      containers:
      - name: emergency-ops
        image: {{ .Values.emergencyops.image }}
        ports:
        - containerPort: 8080
        resources:
          requests:
            memory: "64Mi"
            cpu: "25m"
          limits:
            memory: "128Mi"
            cpu: "500m"
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
{{- end }}