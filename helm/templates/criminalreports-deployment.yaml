{{- if .Values.criminalreports.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: criminal-reports
spec:
  replicas: 1
  selector:
    matchLabels:
      app: criminal-reports
  template:
    metadata:
      labels:
        app: criminal-reports
    spec:
      containers:
      - name: criminal-reports
        image: {{ .Values.criminalreports.image }}
        ports:
        - containerPort: 8080
        resources:
          requests:
            memory: "64Mi"
            cpu: "25m"
          limits:
            memory: "128Mi"
            cpu: "500m"
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
{{- end }}