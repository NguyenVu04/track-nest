apiVersion: v1
kind: Secret
metadata:
  name: {{ include "tracknest.secretsName" . }}
  labels:
    {{- include "tracknest.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- /*
    Credentials are sourced from .Values.secrets so each environment can
    override them via values-<env>.yaml or --set-file. The defaults below
    match docker-compose/docker-compose.prod.yaml and MUST be rotated
    before production use.
  */ -}}
  {{- range $key, $value := .Values.secrets }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
