{{- if .Values.usertracking.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-tracking
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-tracking
  template:
    metadata:
      labels:
        app: user-tracking
    spec:
      containers:
      - name: user-tracking
        image: {{ .Values.usertracking.image }}
        ports:
        - containerPort: 8000
        resources:
          requests:
            memory: "64Mi"
            cpu: "25m"
          limits:
            memory: "128Mi"
            cpu: "500m"
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
{{- end }}