apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  labels:
    {{- include "gateway.nginxLabels" . | nindent 4 }}
data:
  nginx.conf: |
    worker_processes auto;
    worker_rlimit_nofile 65535;

    events {
        worker_connections 4096;
        multi_accept on;
        use epoll;
    }

    http {
        include       /etc/nginx/mime.types;
        default_type  application/octet-stream;

        # --- Hardening: hide identifying info ---
        server_tokens off;

        # --- Performance ---
        sendfile on;
        tcp_nopush on;
        tcp_nodelay on;
        keepalive_timeout 30;
        keepalive_requests 1000;
        types_hash_max_size 2048;

        # Open file cache (reduces stat() syscalls)
        open_file_cache max=2000 inactive=20s;
        open_file_cache_valid 60s;
        open_file_cache_min_uses 2;
        open_file_cache_errors on;

        # --- Request limits (slowloris / abuse mitigation) ---
        client_max_body_size 10m;
        client_body_buffer_size 128k;
        client_header_buffer_size 1k;
        large_client_header_buffers 4 8k;
        client_body_timeout 10s;
        client_header_timeout 10s;
        send_timeout 10s;
        reset_timedout_connection on;

        # --- Logging ---
        log_format main '$remote_addr - $remote_user [$time_local] '
                        '"$request" $status $body_bytes_sent '
                        '"$http_referer" "$http_user_agent" '
                        'rt=$request_time uct="$upstream_connect_time" '
                        'urt="$upstream_response_time" cid="$http_x_correlation_id"';
        access_log /var/log/nginx/access.log main buffer=16k flush=5s;
        error_log  /var/log/nginx/error.log warn;

        # --- Compression ---
        gzip on;
        gzip_vary on;
        gzip_proxied any;
        gzip_comp_level 5;
        gzip_min_length 1024;
        gzip_types
            application/javascript
            application/json
            application/xml
            application/xml+rss
            image/svg+xml
            text/css
            text/javascript
            text/plain
            text/xml;

        # --- Rate limiting (per client IP) ---
        limit_req_zone $binary_remote_addr zone=auth_zone:10m rate=10r/s;
        limit_req_zone $binary_remote_addr zone=web_zone:10m rate=50r/s;
        limit_req_status 429;
        limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

        # --- WebSocket connection mapping ---
        map $http_upgrade $connection_upgrade {
            default upgrade;
            ''      close;
        }

        # --- Upstreams with keepalive ---
        upstream web {
            server web:3000;
            keepalive 32;
            keepalive_timeout 60s;
        }

        upstream keycloak {
            server keycloak:8080;
            keepalive 16;
            keepalive_timeout 60s;
        }

        # --- Default server: drop unknown Host ---
        server {
            listen 80 default_server;
            listen 443 ssl http2 default_server;
            server_name _;

            ssl_certificate     /etc/nginx/ssl/tls.crt;
            ssl_certificate_key /etc/nginx/ssl/tls.key;

            return 444;
        }

        # --- HTTP -> HTTPS redirect ---
        server {
            listen 80;
            server_name _;
            return 301 https://$host$request_uri;
        }

        # --- Main HTTPS server ---
        server {
            listen 443 ssl http2;
            server_name _;

            ssl_certificate     /etc/nginx/ssl/tls.crt;
            ssl_certificate_key /etc/nginx/ssl/tls.key;

            ssl_protocols TLSv1.2 TLSv1.3;
            ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
            ssl_prefer_server_ciphers off;
            ssl_ecdh_curve X25519:secp384r1;
            ssl_session_cache shared:SSL:10m;
            ssl_session_timeout 1d;
            ssl_session_tickets off;

            limit_conn conn_per_ip 50;

            add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Permissions-Policy "geolocation=(self), microphone=(), camera=(), payment=()" always;
            add_header Cross-Origin-Opener-Policy "same-origin" always;
            add_header X-XSS-Protection "0" always;

            location ~ /\.(?!well-known) {
                deny all;
                access_log off;
                log_not_found off;
                return 404;
            }

            # Next.js UI
            location / {
                limit_req zone=web_zone burst=100 nodelay;

                proxy_pass http://web;
                proxy_http_version 1.1;

                proxy_set_header Upgrade           $http_upgrade;
                proxy_set_header Connection        $connection_upgrade;
                proxy_set_header Host              $host;
                proxy_set_header X-Real-IP         $remote_addr;
                proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto https;
                proxy_set_header X-Forwarded-Host  $host;
                proxy_set_header X-Forwarded-Port  443;

                proxy_connect_timeout 5s;
                proxy_send_timeout    60s;
                proxy_read_timeout    60s;

                proxy_cache_bypass $http_upgrade;
                proxy_buffering    on;
            }

            # Keycloak
            location /auth/ {
                limit_req zone=auth_zone burst=20 nodelay;

                proxy_pass http://keycloak/auth/;
                proxy_http_version 1.1;
                proxy_set_header Connection "";

                proxy_set_header Host              $host;
                proxy_set_header X-Real-IP         $remote_addr;
                proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto https;
                proxy_set_header X-Forwarded-Host  $host;
                proxy_set_header X-Forwarded-Port  443;

                proxy_connect_timeout 5s;
                proxy_send_timeout    30s;
                proxy_read_timeout    30s;
            }
        }

        # Internal metrics server — localhost only, for nginx-prometheus-exporter sidecar.
        server {
            listen {{ .Values.nginx.stubStatusPort }};
            server_name localhost;
            access_log off;

            location /stub_status {
                stub_status;
                allow 127.0.0.1;
                deny all;
            }
        }
    }
