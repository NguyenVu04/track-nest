apiVersion: v1
kind: Service
metadata:
  name: envoy
  labels:
    {{- include "gateway.envoyLabels" . | nindent 4 }}
spec:
  type: {{ .Values.envoy.serviceType }}
  selector:
    {{- include "gateway.envoySelector" . | nindent 4 }}
  ports:
    - name: https
      port: {{ .Values.envoy.servicePort }}
      targetPort: https
      protocol: TCP
