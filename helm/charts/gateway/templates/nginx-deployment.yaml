apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-nginx
  labels:
    {{- include "gateway.nginxLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.nginx.replicaCount }}
  revisionHistoryLimit: {{ .Values.nginx.revisionHistoryLimit }}
  strategy:
    {{- toYaml .Values.nginx.strategy | nindent 4 }}
  selector:
    matchLabels:
      {{- include "gateway.nginxSelector" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "gateway.nginxSelector" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/nginx-configmap.yaml") . | sha256sum }}
    spec:
      terminationGracePeriodSeconds: {{ .Values.nginx.terminationGracePeriodSeconds }}
      securityContext:
        {{- toYaml .Values.nginx.podSecurityContext | nindent 8 }}
      containers:
        - name: nginx
          image: "{{ .Values.nginx.image.repository }}:{{ .Values.nginx.image.tag }}"
          imagePullPolicy: {{ .Values.nginx.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.nginx.containerSecurityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.nginx.resources | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.nginx.plainPort }}
              protocol: TCP
            - name: https
              containerPort: {{ .Values.nginx.port }}
              protocol: TCP
            - name: stub-status
              containerPort: {{ .Values.nginx.stubStatusPort }}
              protocol: TCP
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
            - name: cf-cert
              mountPath: /etc/nginx/ssl
              readOnly: true
            - name: nginx-cache
              mountPath: /var/cache/nginx
          livenessProbe:
            tcpSocket:
              port: https
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            tcpSocket:
              port: https
            initialDelaySeconds: 5
            periodSeconds: 10
        - name: metrics
          image: "{{ .Values.nginx.metrics.image.repository }}:{{ .Values.nginx.metrics.image.tag }}"
          imagePullPolicy: {{ .Values.nginx.image.pullPolicy }}
          args:
            - --nginx.scrape-uri=http://127.0.0.1:{{ .Values.nginx.stubStatusPort }}/stub_status
          ports:
            - name: metrics
              containerPort: {{ .Values.nginx.metricsPort }}
              protocol: TCP
          resources:
            requests:
              cpu: "20m"
              memory: "16Mi"
            limits:
              cpu: "50m"
              memory: "32Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1001
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: nginx-config
          configMap:
            name: nginx-config
        - name: cf-cert
          secret:
            secretName: {{ .Values.tlsSecretName }}
        - name: nginx-cache
          emptyDir: {}
