apiVersion: v1
kind: ConfigMap
metadata:
  name: envoy-config
  labels:
    {{- include "gateway.envoyLabels" . | nindent 4 }}
data:
  envoy.yaml: |
    overload_manager:
      refresh_interval: 0.25s
      resource_monitors:
        - name: envoy.resource_monitors.fixed_heap
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.resource_monitors.fixed_heap.v3.FixedHeapConfig
            max_heap_size_bytes: 536870912
      actions:
        - name: envoy.overload_actions.shrink_heap
          triggers:
            - name: envoy.resource_monitors.fixed_heap
              threshold:
                value: 0.92
        - name: envoy.overload_actions.stop_accepting_requests
          triggers:
            - name: envoy.resource_monitors.fixed_heap
              threshold:
                value: 0.98

    static_resources:
      listeners:
        - name: grpc_web_listener
          address:
            socket_address:
              address: 0.0.0.0
              port_value: {{ .Values.envoy.port }}
          per_connection_buffer_limit_bytes: 1048576
          filter_chains:
            - transport_socket:
                name: envoy.transport_sockets.tls
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.DownstreamTlsContext
                  common_tls_context:
                    tls_params:
                      tls_minimum_protocol_version: TLSv1_2
                      tls_maximum_protocol_version: TLSv1_3
                      cipher_suites:
                        - "ECDHE-ECDSA-AES256-GCM-SHA384"
                        - "ECDHE-RSA-AES256-GCM-SHA384"
                        - "ECDHE-ECDSA-CHACHA20-POLY1305"
                        - "ECDHE-RSA-CHACHA20-POLY1305"
                        - "ECDHE-ECDSA-AES128-GCM-SHA256"
                        - "ECDHE-RSA-AES128-GCM-SHA256"
                    tls_certificates:
                      - certificate_chain:
                          filename: "/etc/ssl/tls.crt"
                        private_key:
                          filename: "/etc/ssl/tls.key"
              filters:
                - name: envoy.filters.network.http_connection_manager
                  typed_config:
                    "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                    stat_prefix: ingress_http
                    server_header_transformation: PASS_THROUGH
                    normalize_path: true
                    merge_slashes: true
                    path_with_escaped_slashes_action: UNESCAPE_AND_REDIRECT
                    stream_idle_timeout: 300s
                    request_headers_timeout: 10s
                    common_http_protocol_options:
                      idle_timeout: 60s
                      max_connection_duration: 3600s
                      headers_with_underscores_action: DROP_HEADER
                    http2_protocol_options:
                      max_concurrent_streams: 100
                      initial_stream_window_size: 65536
                      initial_connection_window_size: 1048576
                    original_ip_detection_extensions:
                      - name: envoy.extensions.http.original_ip_detection.custom_header
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.http.original_ip_detection.custom_header.v3.CustomHeaderConfig
                          header_name: "CF-Connecting-IP"
                    access_log:
                      - name: envoy.access_loggers.stdout
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog

                    route_config:
                      name: local_route
                      virtual_hosts:
                        - name: backend_services
                          domains: ["*"]
                          cors:
                            allow_origin_string_match:
                              - exact: "http://localhost"
                              - exact: "http://localhost:3000"
                              - exact: "https://tracknestapp.org"
                              - exact: "https://api.tracknestapp.org"
                            allow_methods: "GET, POST, PUT, DELETE, OPTIONS"
                            allow_headers: "authorization,content-type,x-correlation-id,x-requested-with,x-grpc-web,x-user-agent,grpc-timeout"
                            expose_headers: "grpc-status,grpc-message,grpc-status-details-bin"
                            max_age: "3600"
                            allow_credentials: true
                          routes:
                            - match:
                                prefix: "/emergency-ops/"
                              route:
                                cluster: emergency_ops_rest
                                timeout: 30s
                                upgrade_configs:
                                  - upgrade_type: websocket

                            - match:
                                prefix: "/criminal-reports/"
                              route:
                                cluster: criminal_reports_rest
                                timeout: 30s

                            - match:
                                prefix: "/"
                              route:
                                cluster: user_tracking_grpc
                                timeout: 0s
                                idle_timeout: 0s

                    http_filters:
                      - name: envoy.filters.http.cors
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.cors.v3.Cors

                      - name: envoy.filters.http.local_ratelimit
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.local_ratelimit.v3.LocalRateLimit
                          stat_prefix: http_local_rate_limiter
                          token_bucket:
                            max_tokens: 2000
                            tokens_per_fill: 2000
                            fill_interval: 1s
                          filter_enabled:
                            runtime_key: local_rate_limit_enabled
                            default_value:
                              numerator: 100
                              denominator: HUNDRED
                          filter_enforced:
                            runtime_key: local_rate_limit_enforced
                            default_value:
                              numerator: 100
                              denominator: HUNDRED
                          response_headers_to_add:
                            - append_action: OVERWRITE_IF_EXISTS_OR_ADD
                              header:
                                key: x-local-rate-limit
                                value: 'true'

                      - name: envoy.filters.http.jwt_authn
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.jwt_authn.v3.JwtAuthentication
                          providers:
                            keycloak_public:
                              audiences: ["account"]
                              remote_jwks:
                                http_uri:
                                  uri: "http://keycloak:8080/auth/realms/public-dev/protocol/openid-connect/certs"
                                  cluster: keycloak_jwks
                                  timeout: 5s
                                cache_duration: 3600s
                                async_fetch: {}
                              forward: true
                              payload_in_metadata: jwt_payload

                            keycloak_restricted:
                              audiences: ["account"]
                              remote_jwks:
                                http_uri:
                                  uri: "http://keycloak:8080/auth/realms/restricted-dev/protocol/openid-connect/certs"
                                  cluster: keycloak_jwks
                                  timeout: 5s
                                cache_duration: 3600s
                                async_fetch: {}
                              forward: true
                              payload_in_metadata: jwt_payload

                          rules:
                            - match:
                                prefix: "/emergency-ops/swagger-ui"

                            - match:
                                prefix: "/emergency-ops/api-docs"

                            - match:
                                prefix: "/emergency-ops/"
                              requires:
                                requires_any:
                                  requirements:
                                    - provider_name: keycloak_public
                                    - provider_name: keycloak_restricted

                            - match:
                                prefix: "/criminal-reports/swagger-ui"

                            - match:
                                prefix: "/criminal-reports/api-docs"

                            - match:
                                prefix: "/criminal-reports/"
                              requires:
                                requires_any:
                                  requirements:
                                    - provider_name: keycloak_public
                                    - provider_name: keycloak_restricted

                            - match:
                                prefix: "/"
                              requires:
                                provider_name: keycloak_public

                      - name: envoy.filters.http.grpc_web
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.grpc_web.v3.GrpcWeb

                      - name: envoy.filters.http.router
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

      clusters:
        - name: emergency_ops_rest
          connect_timeout: 5s
          type: logical_dns
          dns_refresh_rate: 5s
          respect_dns_ttl: true
          lb_policy: round_robin
          per_connection_buffer_limit_bytes: 1048576
          circuit_breakers:
            thresholds:
              - priority: DEFAULT
                max_connections: 1000
                max_pending_requests: 1000
                max_requests: 1000
                max_retries: 3
          outlier_detection:
            consecutive_5xx: 5
            interval: 10s
            base_ejection_time: 30s
            max_ejection_percent: 50
          load_assignment:
            cluster_name: emergency_ops_rest
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: emergency-ops
                          port_value: 28080

        - name: criminal_reports_rest
          connect_timeout: 5s
          type: logical_dns
          dns_refresh_rate: 5s
          respect_dns_ttl: true
          lb_policy: round_robin
          per_connection_buffer_limit_bytes: 1048576
          circuit_breakers:
            thresholds:
              - priority: DEFAULT
                max_connections: 1000
                max_pending_requests: 1000
                max_requests: 1000
                max_retries: 3
          outlier_detection:
            consecutive_5xx: 5
            interval: 10s
            base_ejection_time: 30s
            max_ejection_percent: 50
          load_assignment:
            cluster_name: criminal_reports_rest
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: criminal-reports
                          port_value: 38080

        - name: user_tracking_grpc
          connect_timeout: 5s
          type: logical_dns
          dns_refresh_rate: 5s
          respect_dns_ttl: true
          lb_policy: round_robin
          per_connection_buffer_limit_bytes: 1048576
          typed_extension_protocol_options:
            envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
              "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
              explicit_http_config:
                http2_protocol_options:
                  max_concurrent_streams: 100
                  initial_stream_window_size: 65536
                  initial_connection_window_size: 1048576
          circuit_breakers:
            thresholds:
              - priority: DEFAULT
                max_connections: 1000
                max_pending_requests: 1000
                max_requests: 10000
                max_retries: 3
          outlier_detection:
            consecutive_gateway_failure: 5
            consecutive_5xx: 5
            interval: 10s
            base_ejection_time: 30s
            max_ejection_percent: 50
          load_assignment:
            cluster_name: user_tracking_grpc
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: user-tracking
                          port_value: 19090

        - name: keycloak_jwks
          connect_timeout: 5s
          type: logical_dns
          dns_refresh_rate: 30s
          respect_dns_ttl: true
          lb_policy: round_robin
          circuit_breakers:
            thresholds:
              - priority: DEFAULT
                max_connections: 100
                max_pending_requests: 100
                max_requests: 100
                max_retries: 3
          load_assignment:
            cluster_name: keycloak_jwks
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: keycloak
                          port_value: 8080

    admin:
      address:
        socket_address:
          address: 127.0.0.1
          port_value: {{ .Values.envoy.adminPort }}
