apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-keycloak
  labels:
    app: keycloak
spec:
  replicas: {{ .Values.keycloak.replicaCount }}

  selector:
    matchLabels:
      app: keycloak

  template:
    metadata:
      labels:
        app: keycloak

    spec:
      containers:
        - name: keycloak
          image: "{{ .Values.keycloak.image.repository }}:{{ .Values.keycloak.image.tag }}"
          imagePullPolicy: IfNotPresent

          args:
            - "start"
            - "--import-realm"

          ports:
            - name: http
              containerPort: {{ .Values.keycloak.port }}

            - name: management
              containerPort: {{ .Values.keycloak.managementPort }}

          env:
            # ========================
            # ADMIN
            # ========================
            - name: KC_BOOTSTRAP_ADMIN_USERNAME
              value: "admin"

            - name: KC_BOOTSTRAP_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: KEYCLOAK_ADMIN_PASSWORD

            # ========================
            # DATABASE
            # ========================
            - name: KC_DB
              value: "postgres"

            - name: KC_DB_URL
              value: "{{ .Values.keycloak.database.url }}"

            - name: KC_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: KEYCLOAK_DB_USERNAME

            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: KEYCLOAK_DB_PASSWORD

            # ========================
            # 🔥 CRITICAL: HTTP MODE
            # ========================
            - name: KC_HTTP_ENABLED
              value: "true"

            # ========================
            # 🔥 PROXY / HTTPS FIX
            # ========================
            - name: KC_PROXY
              value: "edge"

            - name: KC_PROXY_HEADERS
              value: "xforwarded"

            - name: KC_HOSTNAME
              value: "tracknestapp.org"

            - name: KC_HOSTNAME_STRICT
              value: "false"

            - name: KC_HOSTNAME_STRICT_HTTPS
              value: "true"

            # ========================
            # PATH
            # ========================
            - name: KC_HTTP_RELATIVE_PATH
              value: "/auth"

            # ========================
            # OBSERVABILITY
            # ========================
            - name: KC_HEALTH_ENABLED
              value: "true"

            - name: KC_METRICS_ENABLED
              value: "true"

          volumeMounts:
            - name: realm-config
              mountPath: /opt/keycloak/data/import
              readOnly: true

          readinessProbe:
            httpGet:
              path: /auth/health/ready
              port: management
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 5

          livenessProbe:
            httpGet:
              path: /auth/health/live
              port: management
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 5

          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"

      volumes:
        - name: realm-config
          configMap:
            name: keycloak-realm-config