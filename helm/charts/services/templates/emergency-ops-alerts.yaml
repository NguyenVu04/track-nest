apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: emergency-ops-alerts
  namespace: {{ .Release.Namespace }}
  labels:
    release: {{ .Release.Name }}
spec:
  groups:
    - name: emergency-ops.rules
      rules:
        - alert: HighErrorRate
          expr: |
            sum(rate(http_server_requests_seconds_count{job="emergency-ops", status=~"5.."}[1m]))
            /
            sum(rate(http_server_requests_seconds_count{job="emergency-ops"}[1m]))
            > 0.05
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: "High error rate"

        - alert: HighLatency
          expr: |
            histogram_quantile(0.95,
              sum(rate(http_server_requests_seconds_bucket{job="emergency-ops"}[5m])) by (le)
            ) > 0.5
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: "High latency (P95 > 0.5s)"

        - alert: PodDown
          expr: |
            up{job="emergency-ops"} == 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "Pod is down"