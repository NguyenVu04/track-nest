apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-criminal-reports
  labels:
    {{- include "services.labels" (dict "Ctx" . "Name" "criminal-reports") | nindent 4 }}
spec:
  replicas: {{ .Values.criminalReports.replicaCount }}
  revisionHistoryLimit: {{ .Values.defaults.revisionHistoryLimit }}
  strategy:
    {{- toYaml .Values.defaults.strategy | nindent 4 }}
  selector:
    matchLabels:
      {{- include "services.selectorLabels" (dict "Ctx" . "Name" "criminal-reports") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "services.selectorLabels" (dict "Ctx" . "Name" "criminal-reports") | nindent 8 }}
    spec:
      terminationGracePeriodSeconds: {{ .Values.defaults.terminationGracePeriodSeconds }}
      securityContext:
        {{- toYaml .Values.defaults.podSecurityContext | nindent 8 }}
      containers:
        - name: criminal-reports
          image: "{{ .Values.criminalReports.image.repository }}:{{ .Values.criminalReports.image.tag }}"
          imagePullPolicy: {{ .Values.defaults.imagePullPolicy }}
          securityContext:
            {{- toYaml .Values.defaults.containerSecurityContext | nindent 12 }}

          resources:
            {{- toYaml .Values.defaults.resources | nindent 12 }}

          ports:
            - name: http
              containerPort: {{ .Values.criminalReports.port }}
              protocol: TCP
            - name: management
              containerPort: 8081
              protocol: TCP

          env:
            {{- include "services.commonEnv" . | nindent 12 }}

            # --- Database ---
            - name: DB_HOST
              value: {{ .Values.criminalReports.database.host | quote }}
            - name: DB_PORT
              value: {{ .Values.criminalReports.database.port | quote }}
            - name: DB_NAME
              value: {{ .Values.criminalReports.database.name | quote }}
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: CRIMINAL_REPORTS_DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: CRIMINAL_REPORTS_DB_PASSWORD

            # --- Object storage (DO Spaces / S3-compatible) ---
            - name: MINIO_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: MINIO_ENDPOINT
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: MINIO_ACCESS_KEY
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: MINIO_SECRET_KEY

            # --- Gemini (vision/chat) ---
            - name: GOOGLE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: GOOGLE_API_KEY
            - name: GOOGLE_GEMINI_CHAT_MODEL
              value: {{ .Values.criminalReports.gemini.chatModel | quote }}

          volumeMounts:
            - name: truststore
              mountPath: /app/certs
              readOnly: true

          livenessProbe:
            {{- include "services.livenessProbe" . | nindent 12 }}
          readinessProbe:
            {{- include "services.readinessProbe" . | nindent 12 }}

      volumes:
        - name: truststore
          secret:
            secretName: {{ .Release.Name }}-certs
