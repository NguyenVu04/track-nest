apiVersion: v1
kind: Service
metadata:
  name: emergency-ops
  labels:
    app: emergency-ops
spec:
  type: ClusterIP
  selector:
    app: emergency-ops
  ports:
    - name: http
      port: {{ .Values.emergencyOps.port }}
      targetPort: {{ .Values.emergencyOps.port }}

    - name: management
      port: 8081
      targetPort: 8081