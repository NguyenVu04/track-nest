apiVersion: v1
kind: Service
metadata:
  name: user-tracking
  labels:
    app: user-tracking
spec:
  type: ClusterIP
  selector:
    app: user-tracking
  ports:
    - name: http
      port: {{ .Values.userTracking.port }}
      targetPort: {{ .Values.userTracking.port }}

    - name: management
      port: 8081
      targetPort: 8081