{{- if .Values.userTracking.hpa.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ .Release.Name }}-user-tracking
  labels:
    {{- include "services.labels" (dict "Ctx" . "Name" "user-tracking") | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ .Release.Name }}-user-tracking
  minReplicas: {{ .Values.userTracking.hpa.minReplicas }}
  maxReplicas: {{ .Values.userTracking.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.userTracking.hpa.targetCPUUtilizationPercentage }}
{{- end }}
