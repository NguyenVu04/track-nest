############################################################
# Services subchart — three Spring Boot services.
# Each exposes :8081 for management (actuator/prometheus).
############################################################

# --- Shared defaults, referenced by each service ---------
defaults:
  imagePullPolicy: IfNotPresent
  revisionHistoryLimit: 5
  terminationGracePeriodSeconds: 45

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  # Non-root UID baked into the upstream eclipse-temurin runtime image.
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    seccompProfile:
      type: RuntimeDefault

  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop: ["ALL"]

  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "1"
      memory: "1Gi"

  probes:
    liveness:
      path: /actuator/health/liveness
      port: 8081
      initialDelaySeconds: 60
      periodSeconds: 30
      timeoutSeconds: 5
      failureThreshold: 3
    readiness:
      path: /actuator/health/readiness
      port: 8081
      initialDelaySeconds: 60
      periodSeconds: 30
      timeoutSeconds: 5
      failureThreshold: 3

# --- Shared infra wiring ---------------------------------
kafka:
  server: kafka-ab0708-tracknest.j.aivencloud.com:25187
  truststorePath: /app/certs/truststore.jks

keycloak:
  authServerUrl: http://keycloak:8080/auth
  publicRealm: public-dev

# Comma-separated CORS origins applied to every service.
origins: "http://localhost:3000,http://localhost,https://tracknestapp.org,https://api.tracknestapp.org"

# Spring profile activated in every service container.
springProfile: prod

# --- user-tracking ---------------------------------------
userTracking:
  replicaCount: 1

  image:
    repository: nguyenvu04/tracknest-usertracking
    tag: "v1.2.8"

  # gRPC (external) and HTTP (internal REST/actuator) ports.
  grpcPort: 19090
  httpPort: 18080

  database:
    host: ep-little-term-aod6lu6p-pooler.c-2.ap-southeast-1.aws.neon.tech
    port: 5432
    name: neondb

  hpa:
    enabled: false
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 75

  pdb:
    enabled: false
    minAvailable: 1

