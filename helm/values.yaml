kafka:
  image:
    repository: bitnamilegacy/kafka
    # repository: bitnamisecure/kafka
    # tag: latest
  replicaCount: 1
  zookeeper:
    enabled: true
    replicaCount: 1
  auth:
    enabled: false
  service:
    type: ClusterIP
    port: 9092
  persistence:
    enabled: true
    size: 1Gi
  config:
    log.retention.hours: 168
    log.retention.bytes: 1073741824
    log.segment.bytes: 1073741824
    auto.create.topics.enable: true
  listeners:
    client:
      protocol: PLAINTEXT
    interbroker:
      protocol: PLAINTEXT
    auto:
      create:
        topics:
          enable: true
  controller:
    replicaCount: 1
  metrics:
    kafka:
      enabled: true
    jmx:
      enabled: false

apisix:
  apisix:
    deployment:
      role: traditional
      role_traditional:
        config_provider: yaml

    admin:
      enabled: true
      enable_admin_ui: true
      allow_admin:
        - 127.0.0.0/24
      admin_key:
        - name: admin
          role: admin
          key: edd1c9f034335f136f87ad84b625c8f1

  etcd:
    enabled: false

  ingress-controller:
    enabled: true
    config:
      provider:
        type: apisix-standalone
    apisix:
      adminService:
        name: track-nest-apisix-admin
        namespace: dev
    gatewayProxy:
      createDefault: true
      provider:
        type: ControlPlane
        controlPlane:
          auth:
            type: AdminKey
            adminKey:
              value: edd1c9f034335f136f87ad84b625c8f1

