redis:
  enabled: true
  architecture: replication
  auth:
    enabled: true
    password: "redis-admin"
  master:
    count: 1
  replica:
    replicaCount: 1
    kind: StatefulSet

kafka:
  replicaCount: 1
  zookeeper:
    enabled: true
    replicaCount: 1
  auth:
    enabled: false
  service:
    type: ClusterIP
    port: 9092
  persistence:
    enabled: true
    size: 1Gi
  config:
    log.retention.hours: 168
    log.retention.bytes: 1073741824
    log.segment.bytes: 1073741824
    auto.create.topics.enable: true
  listeners:
    client:
      protocol: PLAINTEXT
    interbroker:
      protocol: PLAINTEXT
  metrics:
    kafka:
      enabled: true
    jmx:
      enabled: false

apisix:
  apisix:
    deployment:
      role: traditional
      role_traditional:
        config_provider: yaml

  etcd:
    enabled: false

  ingress-controller:
    enabled: true
    config:
      provider:
        type: apisix-standalone
    apisix:
      adminService:
        name: track-nest-apisix-admin
        namespace: dev
    gatewayProxy:
      createDefault: true

elasticsearch:
  enabled: true
  replicas: 1
  minimumMasterNodes: 1
  resources:
    requests:
      cpu: 250m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 128Mi
  volumeClaimTemplate:
    accessModes: [ "ReadWriteOnce" ]
    resources:
      requests:
        storage: 1Gi

minio:
  enabled: true
  mode: standalone
  rootUser: "minioadmin"
  rootPassword: "minioadmin"
  persistence:
    enabled: false
  resources:
    requests:
      cpu: 10m
      memory: 64Mi

vault:
  enabled: true
  server:
    dev:
      enabled: true
    dataStorage:
      enabled: false

