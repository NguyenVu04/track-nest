minio:
  enabled: true
  mode: standalone
  rootUser: "minioadmin"
  rootPassword: "minioadmin"
  persistence:
    enabled: false
  resources:
    requests:
      cpu: 100m
      memory: 128Mi

vault:
  enabled: true
  server:
    dev:
      enabled: true
    dataStorage:
      enabled: false

IAM:
  Image: "nguyenvu04/track-nest.iam:dev"
  DBVendor: "postgres"
  DBUsername: "database-admin"
  DBPassword: "database-admin"
  DBUrl: "jdbc:postgresql://iam-database:5432/tracknest"

UserTracking:
  Image: "nguyenvu04/track-nest.user-tracking:dev"

CriminalReports:
  Image: "nguyenvu04/track-nest.criminal-reports:dev"

EmergencyOps:
  Image: "nguyenvu04/track-nest.emergency-ops:dev"