kafka:
  image:
    repository: bitnamilegacy/kafka
    # tag: latest

  controller:
    replicaCount: 1

  listeners:
    client:
      protocol: PLAINTEXT
    interbroker:
      protocol: PLAINTEXT
    external:
      protocol: PLAINTEXT

  advertisedListeners:
    client:
      protocol: PLAINTEXT
      name: EXTERNAL
      port: 9092
      external:
        enabled: true

  auth:
    enabled: false

  persistence:
    enabled: true
    size: 2Gi
    storageClass: "standard"

  resources:
    requests:
      memory: 512Mi
      cpu: 250m
    limits:
      memory: 1024Mi
      cpu: 1

  externalAccess:
    enabled: true
    autoDiscovery:
      enabled: true
    controller:
      service:
        type: LoadBalancer
        loadBalancerNames:
          - kafka-lb

  service:
    type: LoadBalancer
    ports:
      client: 9092

apisix:
  apisix:
    deployment:
      role: traditional
      role_traditional:
        config_provider: yaml

    admin:
      enabled: true
      enable_admin_ui: true
      allow_admin:
        - 127.0.0.0/24
      admin_key:
        - name: admin
          role: admin
          key: edd1c9f034335f136f87ad84b625c8f1

  etcd:
    enabled: false

  ingress-controller:
    enabled: true
    config:
      provider:
        type: apisix-standalone
    apisix:
      adminService:
        name: track-nest-apisix-admin
        namespace: dev
    gatewayProxy:
      createDefault: true
      provider:
        type: ControlPlane
        controlPlane:
          auth:
            type: AdminKey
            adminKey:
              value: edd1c9f034335f136f87ad84b625c8f1

