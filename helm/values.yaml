redis:
  enabled: true
  architecture: replication
  auth:
    enabled: true
    password: "redis-admin"
  master:
    count: 1
  replica:
    replicaCount: 1
    kind: StatefulSet

kafka:
  replicaCount: 3
  image:
    tag: 3.7.0-debian-11-r0
  zookeeper:
    enabled: true
    replicaCount: 3
  auth:
    enabled: false
  service:
    type: ClusterIP
    port: 9092
  persistence:
    enabled: true
    size: 8Gi
  config:
    log.retention.hours: 168
    log.retention.bytes: 1073741824
    log.segment.bytes: 1073741824
    auto.create.topics.enable: true
  listeners:
    client:
      protocol: PLAINTEXT
    interbroker:
      protocol: PLAINTEXT
  metrics:
    kafka:
      enabled: true
    jmx:
      enabled: false

apisix-ingress-controller:
  enabled: true
  apisix:
    adminService:
      namespace: ingress-apisix
  gatewayProxy:
    createDefault: true

elasticsearch:
  enabled: true
  replicas: 1
  minimumMasterNodes: 1
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi
  volumeClaimTemplate:
    accessModes: [ "ReadWriteOnce" ]
    resources:
      requests:
        storage: 2Gi

