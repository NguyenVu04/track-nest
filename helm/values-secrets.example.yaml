############################################################
# values-secrets.example.yaml
#
# Template for the secret values file that CI/CD generates.
# NEVER commit values-secrets.yaml — add it to .gitignore.
#
# CI/CD usage (GitHub Actions example):
#
#   - name: Write secrets file
#     run: |
#       cat > helm/values-secrets.yaml <<EOF
#       secrets:
#         USER_TRACKING_DB_HOST: "${{ secrets.USER_TRACKING_DB_HOST }}"
#         USER_TRACKING_DB_PASSWORD: "${{ secrets.USER_TRACKING_DB_PASSWORD }}"
#         ...
#       EOF
#
#   - name: Deploy
#     run: |
#       helm upgrade --install tracknest ./helm \
#         -f helm/values-secrets.yaml \
#         -n tracknest --create-namespace
############################################################

# --- Kubernetes Secret (tracknest-secrets) ---------------
# All keys below are rendered into a single Opaque secret
# and mounted into every service pod via secretKeyRef.
secrets:
  # --- user-tracking database (Neon) ---
  USER_TRACKING_DB_HOST: ""
  USER_TRACKING_DB_PORT: "5432"
  USER_TRACKING_DB_NAME: ""
  USER_TRACKING_DB_USERNAME: ""
  USER_TRACKING_DB_PASSWORD: ""

  # --- criminal-reports database (Neon) ---
  CRIMINAL_REPORTS_DB_HOST: ""
  CRIMINAL_REPORTS_DB_PORT: "5432"
  CRIMINAL_REPORTS_DB_NAME: ""
  CRIMINAL_REPORTS_DB_USERNAME: ""
  CRIMINAL_REPORTS_DB_PASSWORD: ""
  CRIMINAL_REPORTS_TINYMCE_API_KEY: ""

  # --- emergency-ops database (Neon) ---
  EMERGENCY_OPS_DB_HOST: ""
  EMERGENCY_OPS_DB_PORT: "5432"
  EMERGENCY_OPS_DB_NAME: ""
  EMERGENCY_OPS_DB_USERNAME: ""
  EMERGENCY_OPS_DB_PASSWORD: ""

  # --- Keycloak database (Neon, full JDBC URL) ---
  KEYCLOAK_DB_URL: ""       # jdbc:postgresql://<host>:5432/<db>
  KEYCLOAK_DB_USERNAME: ""
  KEYCLOAK_DB_PASSWORD: ""

  # --- Kafka (Aiven, SASL/SSL) ---
  KAFKA_BOOTSTRAP_SERVERS: ""   # host:port
  KAFKA_USERNAME: ""
  KAFKA_PASSWORD: ""
  KAFKA_SSL_TRUSTSTORE_PASSWORD: ""

  # --- Redis (Upstash) ---
  REDIS_URL: ""

  # --- Google AI (Gemini — criminal-reports) ---
  GOOGLE_API_KEY: ""

  # --- Keycloak application client ---
  KEYCLOAK_CLIENT_SECRET: ""
  KEYCLOAK_ADMIN_PASSWORD: ""

  # --- Firebase Admin SDK (user-tracking) ---
  FIREBASE_SERVICE_ACCOUNT_JSON: ""   # full JSON content as a single-line string

  # --- Telegram bot token (AlertManager) ---
  bot-token: ""

# --- Grafana admin password ------------------------------
kube-prometheus-stack:
  grafana:
    adminPassword: ""
