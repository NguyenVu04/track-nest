syntax = "proto3";

package project.tracknest.usertracking.proto.v1;

import "google/rpc/status.proto";

option java_multiple_files = true;
option java_package = "project.tracknest.usertracking.proto.lib";
option java_outer_classname = "TrackingManagerProto";

// Service: TrackingManagerController
// Manages family circles and membership operations including creation,
// listing, updates, role changes, participation permissions (OTP), joining,
// leaving, and admin assignment. All RPCs return a response that contains
// a `google.rpc.Status` field for rich error reporting.
//
// Notes:
// - Timestamps in responses use milliseconds since epoch (UTC).
// - `google.rpc.Status` is used to convey success/failure and error details.
// - Pagination uses `page_size` and `page_token` on listing requests/responses.
service TrackingManagerController {
  // CreateFamilyCircle
  // Creates a new family circle with the provided `name` and initial `family_role`.
  // On success returns the created `family_circle_id` and `created_at_ms`.
  // Errors are reported in `CreateFamilyCircleResponse.status`.
  rpc CreateFamilyCircle(CreateFamilyCircleRequest)
      returns (CreateFamilyCircleResponse);

  // ListFamilyCircles
  // Returns a paginated list of family circles visible to the caller.
  // Use `page_size` and `page_token` to page through results. `next_page_token`
  // in the response is empty when no more results are available.
  rpc ListFamilyCircles(ListFamilyCirclesRequest)
      returns (ListFamilyCircleResponse);

  // DeleteFamilyCircle
  // Deletes the specified family circle. Only authorized members (e.g., admins)
  // may delete a circle. On success returns the `deleted_at_ms` timestamp.
  // Errors and permission failures are reported in the response `status`.
  rpc DeleteFamilyCircle(DeleteFamilyCircleRequest)
      returns (DeleteFamilyCircleResponse);

  // UpdateFamilyCircle
  // Updates mutable fields of a family circle.
  // Returns `updated_at_ms` on success and reports failures in `status`.
  rpc UpdateFamilyCircle(UpdateFamilyCircleRequest)
      returns (UpdateFamilyCircleResponse);

  rpc ListFamilyCircleMembers(ListFamilyCircleMembersRequest)
      returns (ListFamilyCircleMembersResponse);

  // UpdateFamilyRole
  // Updates the caller's role within the specified family circle or updates a
  // member's role depending on authorization. Returns `updated_at_ms` on success.
  rpc UpdateFamilyRole(UpdateFamilyRoleRequest)
      returns (UpdateFamilyRoleResponse);

  // CreateParticipationPermission
  // Issues a time-limited one-time-passcode (OTP) that can be used by a user
  // to join the specified family circle. Response includes the `otp`,
  // `created_at_ms`, and `expired_at_ms`.
  rpc CreateParticipationPermission(CreateParticipationPermissionRequest)
      returns (CreateParticipationPermissionResponse);

  // ParticipateInFamilyCircle
  // Consumes a valid OTP to add the caller as a participant in the referenced
  // family circle. Returns the joined `family_circle_id` and `participated_at_ms`.
  rpc ParticipateInFamilyCircle(ParticipateInFamilyCircleRequest)
      returns (ParticipateInFamilyCircleResponse);

  // LeaveFamilyCircle
  // Removes the caller from the specified family circle. Returns `left_at_ms`
  // on success. Errors such as "not a member" will be reflected in `status`.
  rpc LeaveFamilyCircle(LeaveFamilyCircleRequest)
      returns (LeaveFamilyCircleResponse);

  //Remove a Member From Family Circle by Admin
  rpc RemoveMemberFromFamilyCircle(RemoveMemberFromFamilyCircleRequest)
      returns (RemoveMemberFromFamilyCircleResponse);

  // AssignFamilyCircleAdmin
  // Grants admin privileges to the specified `member_id` within the given
  // family circle. Returns the `member_id` and `assigned_at_ms` on success.
  rpc AssignFamilyCircleAdmin(AssignFamilyCircleAdminRequest)
      returns (AssignFamilyCircleAdminResponse);
}

message CreateFamilyCircleRequest {
  string name = 1;
  string family_role = 2;
}

message CreateFamilyCircleResponse {
  google.rpc.Status status = 1;
  string family_circle_id = 2;
  uint64 created_at_ms = 3;
}

message ListFamilyCirclesRequest {
  int32 page_size = 1;
  optional string page_token = 2;
}

message FamilyCircleInfo {
  string family_circle_id = 1;
  string name = 2;
  uint64 created_at_ms = 3;
}

message ListFamilyCircleResponse {
  repeated FamilyCircleInfo family_circles = 1;
  optional string next_page_token = 2;
}

message DeleteFamilyCircleRequest {
  string family_circle_id = 1;
}

message DeleteFamilyCircleResponse {
  google.rpc.Status status = 1;
  uint64 deleted_at_ms = 2;
}

message UpdateFamilyCircleRequest {
  string family_circle_id = 1;
  string name = 2;
}

message UpdateFamilyCircleResponse {
  google.rpc.Status status = 1;
  uint64 updated_at_ms = 2;
}

message UpdateFamilyRoleRequest {
  string family_circle_id = 1;
  string family_role = 3;
}

message UpdateFamilyRoleResponse {
  google.rpc.Status status = 1;
  uint64 updated_at_ms = 2;
}

message CreateParticipationPermissionRequest {
  string family_circle_id = 1;
  optional string previous_otp = 2;
}

message CreateParticipationPermissionResponse {
  google.rpc.Status status = 1;
  string otp = 2;
  uint64 created_at_ms = 3;
  uint64 expired_at_ms = 4;
}

message ParticipateInFamilyCircleRequest {
  string otp = 1;
}

message ParticipateInFamilyCircleResponse {
  google.rpc.Status status = 1;
  string family_circle_id = 2;
  uint64 participated_at_ms = 3;
}

message LeaveFamilyCircleRequest {
  string family_circle_id = 1;
}

message LeaveFamilyCircleResponse {
  google.rpc.Status status = 1;
  uint64 left_at_ms = 2;
}

message AssignFamilyCircleAdminRequest {
  string family_circle_id = 1;
  string member_id = 2;
}

message AssignFamilyCircleAdminResponse {
  google.rpc.Status status = 1;
  string member_id = 2;
  uint64 assigned_at_ms = 3;
}

message RemoveMemberFromFamilyCircleRequest {
  string family_circle_id = 1;
  string member_id = 2;
}

message RemoveMemberFromFamilyCircleResponse {
  google.rpc.Status status = 1;
  string member_id = 2;
  uint64 removed_at_ms = 3;
}

message ListFamilyCircleMembersRequest {
  string family_circle_id = 1;
}

message FamilyCircleMemberInfo {
  string member_id = 1;
  string member_username = 2;
  optional string member_avatar_url = 3;
  string family_role = 4;
  bool is_admin = 5;
  bool online = 6;
  uint64 last_active_ms = 7;
}

message ListFamilyCircleMembersResponse {
  google.rpc.Status status = 1;
  repeated FamilyCircleMemberInfo members = 2;
}