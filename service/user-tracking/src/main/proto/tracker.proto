syntax = "proto3";

package project.tracknest.usertracking.proto;

import "google/protobuf/empty.proto";

option java_multiple_files = true;
option java_package = "project.tracknest.usertracking.proto.lib";
option java_outer_classname = "TrackerProto";

service TrackerController {
  rpc postLocation (stream LocationRequest) returns (google.protobuf.Empty);
}

message LocationRequest {
  double latitude = 1;
  double longitude = 2;
  int64 timestamp = 3;
  double accuracy = 4;
  double velocity = 5;
}

message LocationResponse {
  string id = 1;
  double latitude = 2;
  double longitude = 3;
  int64 timestamp = 4;
  double accuracy = 5;
  double velocity = 6;
}

