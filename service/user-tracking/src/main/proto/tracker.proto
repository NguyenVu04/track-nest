syntax = "proto3";

package project.tracknest.usertracking.proto;

import "google/protobuf/empty.proto";
import "google/protobuf/wrappers.proto";

option java_multiple_files = true;
option java_package = "project.tracknest.usertracking.proto.lib";
option java_outer_classname = "TrackerProto";

service TrackerController {
  rpc postLocation (stream LocationRequest) returns (google.protobuf.Empty);
  rpc getTargetsLastLocations (google.protobuf.Empty) returns (stream LocationResponse);
  rpc getTargetLocationHistory (google.protobuf.StringValue) returns (stream LocationResponse);
}

message LocationRequest {
  float latitude = 1;
  float longitude = 2;
  uint64 timestamp = 3;
  float accuracy = 4;
  float velocity = 5;
}

message LocationResponse {
  string id = 1;
  string userId = 2;
  string username = 3;
  float latitude = 4;
  float longitude = 5;
  uint64 timestamp = 6;
  float accuracy = 7;
  float velocity = 8;
  bool connected = 9;
}