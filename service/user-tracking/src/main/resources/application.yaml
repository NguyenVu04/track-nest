spring:
  application:
    name: user-tracking
  security:
    user:
      name: admin
      password: admin
      roles: ADMIN
  kafka:
    bootstrap-servers: ${KAFKA_SERVER:127.0.0.1:29092}
    consumer:
      group-id: user_tracking
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: project.tracknest.usertracking.core.datatype
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    listener:
      missing-topics-fatal: false
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
  datasource:
    url: jdbc:postgresql://${DB_HOST:127.0.0.1}:${DB_PORT:15432}/${DB_NAME:tracknest}
    username: ${DB_USERNAME:tracknestadmin}
    password: ${DB_PASSWORD:tracknestadmin}
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    open-in-view: false
  grpc:
    server:
      port: ${GRPC_PORT:19090}
      ssl:
        secure: false
      host: 0.0.0.0

server:
  port: 18080
  servlet:
    context-path: /api/v1

app:
  kafka:
    topics:
    - location_updated
    - connection-lost
    - notification-sent
    partitions: 3
    replication-factor: 1
  server-name: ${POD_NAME:user-tracking}
  server-uid: ${$POD_UID:0}
  tracking-permission:
    ttl-seconds: 300