spring:
  application:
    name: user-tracking
  security:
    user:
      name: admin
      password: admin
      roles: ADMIN
  kafka:
    bootstrap-servers: ${KAFKA_SERVER:127.0.0.1:29092}
    consumer:
      group-id: user_tracking
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "project.tracknest.*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    listener:
      missing-topics-fatal: false
  data:
    redis:
      url: ${REDIS_URL:redis://127.0.0.1:6379}
  datasource:
    url: jdbc:postgresql://${DB_HOST:127.0.0.1}:${DB_PORT:15432}/${DB_NAME:tracknest}
    username: ${DB_USERNAME:tracknestadmin}
    password: ${DB_PASSWORD:tracknestadmin}
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        javax.persistence.lock.timeout: 3000
    hibernate:
      ddl-auto: validate
    open-in-view: false
  grpc:
    server:
      port: ${GRPC_PORT:19090}
      ssl:
        secure: false
      host: 0.0.0.0
  quartz:
    job-store-type: jdbc
    jdbc:
      initialize-schema: never
    properties:
      org:
        quartz:
          scheduler:
            instanceId: AUTO
          jobStore:
            useProperties: true
            driverDelegateClass: org.quartz.impl.jdbcjobstore.PostgreSQLDelegate
            isClustered: true
          threadPool:
            threadCount: 10

management:
  server:
    port: 8081
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true

server:
  port: 18080

app:
  kafka:
    topics:
    - location-updated
    - notification-sent
    - tracking-notification
    - risk-notification
    partitions: 3
    replication-factor: 1
  server-name: ${POD_NAME:user-tracking}
  server-uid: ${$POD_UID:0}
  security:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost}
    allowed-methods:
      - GET
      - POST
      - PUT
      - DELETE
  quartz:
    jobs:
      disconnectInactiveUsers:
        cron: "0 */3 * * * ?"
        description: "Disconnect inactive users"
      updateGrpcSessions:
        cron: "0 */3 * * * ?"
        description: "Update gRPC sessions"