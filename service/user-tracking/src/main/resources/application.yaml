spring:
  application:
    name: user-tracking
  security:
    user:
      name: admin
      password: admin
      roles: ADMIN
  kafka:
    bootstrap-servers: ${KAFKA_SERVER:127.0.0.1:29092}
    properties:
      security.protocol: SASL_SSL
      sasl.mechanism: PLAIN
      sasl.jaas.config: >
        org.apache.kafka.common.security.plain.PlainLoginModule required
        username="${KAFKA_USERNAME}"
        password="${KAFKA_PASSWORD}";
      ssl:
        truststore:
          location: ${KAFKA_SSL_TRUSTSTORE_LOCATION}
          password: ${KAFKA_SSL_TRUSTSTORE_PASSWORD}
    consumer:
      group-id: user_tracking
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: project.tracknest.usertracking.core.datatype
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    listener:
      missing-topics-fatal: false
  data:
    redis:
      url: ${REDIS_URL:redis://127.0.0.1:6379}
  datasource:
    url: jdbc:postgresql://${DB_HOST:127.0.0.1}:${DB_PORT:15432}/${DB_NAME:tracknest}
    username: ${DB_USERNAME:tracknestadmin}
    password: ${DB_PASSWORD:tracknestadmin}
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        javax.persistence.lock.timeout: 3000
    hibernate:
      ddl-auto: validate
    open-in-view: false
  grpc:
    server:
      port: ${GRPC_PORT:19090}
      ssl:
        secure: false
      host: 0.0.0.0
  quartz:
    job-store-type: jdbc
    jdbc:
      initialize-schema: never
    properties:
      org:
        quartz:
          scheduler:
            instanceId: AUTO
          jobStore:
            useProperties: true
            driverDelegateClass: org.quartz.impl.jdbcjobstore.PostgreSQLDelegate
            isClustered: true
          threadPool:
            threadCount: 10

server:
  port: 18080
  servlet:
    context-path: /api/v1

app:
  kafka:
    topics:
    - location-updated
    - notification-sent
    - tracking-notification
    - risk-notification
    partitions: 3
    replication-factor: 1
  server-name: ${POD_NAME:user-tracking}
  server-uid: ${$POD_UID:0}
  quartz:
    jobs:
      disconnectInactiveUsers:
        cron: "0 */3 * * * ?"
        description: "Disconnect inactive users"
      updateGrpcSessions:
        cron: "0 */3 * * * ?"
        description: "Update gRPC sessions"