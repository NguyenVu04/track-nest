spring:
  application:
    name: emergency-ops
  security:
    user:
      name: admin
      password: admin
      roles: ADMIN
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:127.0.0.1:29092}
    consumer:
      group-id: user_tracking
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    listener:
      missing-topics-fatal: false
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
  datasource:
    url: jdbc:postgresql://${DB_HOST:127.0.0.1}:${DB_PORT:35432}/${DB_NAME:tracknest}
    username: ${DB_USERNAME:tracknestadmin}
    password: ${DB_PASSWORD:tracknestadmin}
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    hibernate:
      ddl-auto: validate
    open-in-view: false


server:
  port: 38080
  servlet:
    context-path: /api/v1

app:
  kafka:
    topics:
      - user_location
    partitions: 3
    replication-factor: 1
  minio:
    endpoint: ${MINIO_ENDPOINT:http://127.0.0.1:9000}
    credentials:
      access-key: ${MINIO_ACCESS_KEY:minioadmin}
      secret-key: ${MINIO_SECRET_KEY:minioadmin}
  server-name: ${POD_NAME:user-tracking}
  server-uid: ${$POD_UID:0}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    display-request-duration: true
    path: /swagger-ui.html