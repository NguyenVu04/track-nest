spring:
  application:
    name: emergency-ops
  security:
    user:
      name: admin
      password: admin
      roles: ADMIN
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:127.0.0.1:29092}
    consumer:
      group-id: user_tracking
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    listener:
      missing-topics-fatal: false
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
  datasource:
    url: jdbc:postgresql://${DB_HOST:127.0.0.1}:${DB_PORT:25432}/${DB_NAME:tracknest}
    username: ${DB_USERNAME:tracknestadmin}
    password: ${DB_PASSWORD:tracknestadmin}
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    hibernate:
      ddl-auto: validate
    open-in-view: false

server:
  port: 28080
  servlet:
    context-path: /api/v1

app:
  kafka:
    topics:
      - user_location
    partitions: 3
    replication-factor: 1
  keycloak:
    server-url: ${KEYCLOAK_AUTH_SERVER_URL:http://localhost/auth}
    restricted-realm: ${KEYCLOAK_RESTRICTED_REALM:restricted-dev}
    client-id: ${KEYCLOAK_CLIENT_ID:emergency-operations}
    client-secret: ${KEYCLOAK_CLIENT_SECRET:cW1FLnTduHxSEjb7L1V8v2paCuHQYEs0}
    public-realm: ${KEYCLOAK_PUBLIC_REALM:public-dev}
  server-name: ${POD_NAME:user-tracking}
  server-uid: ${$POD_UID:0}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    display-request-duration: true
    path: /swagger-ui.html