spring:
  application:
    name: emergency-ops
  security:
    user:
      name: admin
      password: admin
      roles: ADMIN
  kafka:
    bootstrap-servers: 127.0.0.1:29092
    consumer:
      group-id: user_tracking
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    listener:
      missing-topics-fatal: false
  data:
    redis:
      host: 127.0.0.1
      port: 6379
  datasource:
    url: jdbc:postgresql://${DB_HOST:127.0.0.1}:${DB_PORT:25432}/${DB_NAME:tracknest}
    username: ${DB_USERNAME:tracknestadmin}
    password: ${DB_PASSWORD:tracknestadmin}
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    hibernate:
      ddl-auto: validate

server:
  port: 28080
  servlet:
    context-path: /api/v1

app:
  kafka:
    topics:
      - user_location
    partitions: 3
    replication-factor: 1
  server-name: ${POD_NAME:user-tracking}
  server-uid: ${$POD_UID:0}