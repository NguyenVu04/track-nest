spring:
  application:
    name: emergency-ops
  security:
    user:
      name: admin
      password: admin
      roles: ADMIN
  kafka:
    bootstrap-servers: ${KAFKA_SERVER:127.0.0.1:29092}
    properties:
      security.protocol: SASL_SSL
      sasl.mechanism: PLAIN
      sasl.jaas.config: >
        org.apache.kafka.common.security.plain.PlainLoginModule required
        username="${KAFKA_USERNAME}"
        password="${KAFKA_PASSWORD}";
      ssl:
        truststore:
          location: ${KAFKA_SSL_TRUSTSTORE_LOCATION}
          password: ${KAFKA_SSL_TRUSTSTORE_PASSWORD}
    consumer:
      group-id: emergency_ops
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: project.tracknest.emergencyops.core.datatype
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    listener:
      missing-topics-fatal: false
  data:
    redis:
      url: ${REDIS_URL:redis://127.0.0.1:6379}
  datasource:
    url: jdbc:postgresql://${DB_HOST:127.0.0.1}:${DB_PORT:25432}/${DB_NAME:tracknest}
    username: ${DB_USERNAME:tracknestadmin}
    password: ${DB_PASSWORD:tracknestadmin}
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    hibernate:
      ddl-auto: validate
    open-in-view: false

server:
  port: 28080
  servlet:
    context-path: /api/v1

app:
  kafka:
    topics:
    - location-updated
    - tracking-notification
    partitions: 3
    replication-factor: 1
  keycloak:
    server-url: ${KEYCLOAK_AUTH_SERVER_URL:http://localhost/auth}
    client-id: ${KEYCLOAK_CLIENT_ID:emergency-operations}
    client-secret: ${KEYCLOAK_CLIENT_SECRET:2Bu3haFOwsOW7ONprnSGnmVoU8SvHLmy}
    public-realm: ${KEYCLOAK_PUBLIC_REALM:public-dev}
  security:
    allowed-origins:
      - http://localhost
      - http://localhost:3000
    allowed-methods:
      - GET
      - POST
      - PUT
      - DELETE
  stomp:
    queue:
      user-location: /queue/user-location
      emergency-request: /queue/emergency-request
  server-name: ${POD_NAME:emergency-ops}
  server-uid: ${$POD_UID:0}
  quartz:
    jobs:
      updateWebSocketSessions:
        cron: "0 */4 * * * ?"
        description: "Update WebSocket sessions"

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    display-request-duration: true
    path: /swagger-ui.html