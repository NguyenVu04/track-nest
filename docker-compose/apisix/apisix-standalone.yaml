routes:
  - uri: /user-tracking/*
    plugins:
      openid-connect:
        client_id: "tracknest"
        client_secret: "5YgzCDGJLO0uXBhkGMyeJjHE1CKUt4fJ"
        discovery: "http://keycloak:8080/realms/tracknest-user/.well-known/openid-configuration"
        introspection_endpoint: "http://keycloak:8080/realms/tracknest-user/protocol/openid-connect/token/introspect"
        scope: "openid profile"
        realm: "tracknest-user"
        bearer_only: true
        set_access_token_header: true
        access_token_in_authorization_header: true
      proxy-rewrite:
        regex_uri: ["^/user-tracking/(.*)", "/$1"]
    upstream:
      scheme: "grpc"
      type: roundrobin
      nodes:
        "user_tracking:19090": 1
#END