  user_tracking:
    build:
      context: ../service/user-tracking
      dockerfile: Dockerfile
    container_name: user_tracking
    ports:
      - "19090:19090"
    environment:
      KAFKA_SERVER: "broker-1:19092,broker-2:19092,broker-3:19092"
      REDIS_HOST: "redis"
      REDIS_PORT: 6379
      DB_HOST: "user_tracking_postgres"
      DB_PORT: 5432
      DB_NAME: "tracknest"
      DB_USER: "tracknestadmin"
      DB_PASSWORD: "tracknestadmin"
    networks:
      - track_nest
    depends_on:
      - user_tracking_postgres
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  user_tracking_postgres:
    image: timescale/timescaledb-ha:pg17
    container_name: user_tracking_postgres
    environment:
      POSTGRES_USER: tracknestadmin
      POSTGRES_PASSWORD: tracknestadmin
      POSTGRES_DB: tracknest
    ports:
      - "15432:5432"
    volumes:
      - user_tracking_postgres_data:/var/lib/postgresql/data
      - ../database/01-user-tracking-init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ../database/02-user-tracking-seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    networks:
      - track_nest
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tracknestadmin -d tracknest"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  emergency_ops_postgres:
    image: timescale/timescaledb-ha:pg17
    container_name: emergency_ops_postgres
    environment:
      POSTGRES_USER: tracknestadmin
      POSTGRES_PASSWORD: tracknestadmin
      POSTGRES_DB: tracknest
    ports:
      - "25432:5432"
    volumes:
      - emergency_ops_postgres_data:/var/lib/postgresql/data
      - ../database/01-emergency-ops-init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ../database/02-emergency-ops-seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    networks:
      - track_nest
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tracknestadmin -d tracknest"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  criminal_reports_postgres:
    image: timescale/timescaledb-ha:pg17
    container_name: criminal_reports_postgres
    environment:
      POSTGRES_USER: tracknestadmin
      POSTGRES_PASSWORD: tracknestadmin
      POSTGRES_DB: tracknest
    ports:
      - "35432:5432"
    volumes:
      - criminal_reports_postgres_data:/var/lib/postgresql/data
      - ../database/01-criminal-reports-init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ../database/02-criminal-reports-seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    networks:
      - track_nest
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tracknestadmin -d tracknest"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  emergency_detection_postgres:
    image: timescale/timescaledb-ha:pg17
    container_name: emergency_detection_postgres
    environment:
      POSTGRES_USER: tracknestadmin
      POSTGRES_PASSWORD: tracknestadmin
      POSTGRES_DB: tracknest
    ports:
      - "45432:5432"
    volumes:
      - emergency_detection_postgres_data:/var/lib/postgresql/data
      - ../database/01-emergency-detection-init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ../database/02-emergency-detection-seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    networks:
      - track_nest
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tracknestadmin -d tracknest"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
  
  keycloak_postgres:
    image: postgres:latest
    container_name: keycloak_postgres
    environment:
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
      POSTGRES_DB: keycloak
    ports:
      - "5432:5432"
    volumes:
      - keycloak_postgres_data:/var/lib/postgresql
    networks:
      - track_nest
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: keycloak
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak_postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KC_HOSTNAME: localhost
      KC_HOSTNAME_STRICT: 'true'
      KC_HOSTNAME_STRICT_HTTPS: 'false'
      KC_HEALTH_ENABLED: true
    command: start-dev --import-realm 
    volumes:
    - ../keycloak/keycloak-themes:/opt/keycloak/themes
    - ../keycloak/tracknest-user-realm.json:/opt/keycloak/data/import/tracknest-user-realm.json
    - ../keycloak/tracknest-emergency-service-realm.json:/opt/keycloak/data/import/tracknest-emergency-service-realm.json
    - ../keycloak/tracknest-reporter-realm.json:/opt/keycloak/data/import/tracknest-reporter-realm.json
    networks:
      - track_nest
    ports:
      - "8080:8080"
    depends_on:
      keycloak_postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  track_nest:
    driver: bridge

volumes:
  user_tracking_postgres_data:
  emergency_ops_postgres_data:
  criminal_reports_postgres_data:
  emergency_detection_postgres_data:
  keycloak_postgres_data:
  redis-data:
  # esdata:
  ozone-om:
  ozone-dn: