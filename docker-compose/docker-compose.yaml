x-minio-common: &minio-common
  image: quay.io/minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
  command: server --console-address ":9001" http://minio/data{1...2}
  expose:
    - "9000"
    - "9001"
  environment:
    MINIO_ROOT_USER: minioadmin
    MINIO_ROOT_PASSWORD: minioadmin
  networks:
    - track_nest
  healthcheck:
    test: ["CMD", "mc", "ready", "local"]
    interval: 5s
    timeout: 5s
    retries: 5

services:
  controller-1:
    image: apache/kafka:latest
    container_name: controller-1
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: controller
      KAFKA_LISTENERS: CONTROLLER://:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@controller-1:9093,2@controller-2:9093,3@controller-3:9093
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    networks:
      - track_nest

  controller-2:
    image: apache/kafka:latest
    container_name: controller-2
    environment:
      KAFKA_NODE_ID: 2
      KAFKA_PROCESS_ROLES: controller
      KAFKA_LISTENERS: CONTROLLER://:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@controller-1:9093,2@controller-2:9093,3@controller-3:9093
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    networks:
      - track_nest

  controller-3:
    image: apache/kafka:latest
    container_name: controller-3
    environment:
      KAFKA_NODE_ID: 3
      KAFKA_PROCESS_ROLES: controller
      KAFKA_LISTENERS: CONTROLLER://:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@controller-1:9093,2@controller-2:9093,3@controller-3:9093
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    networks:
      - track_nest

  broker-1:
    image: apache/kafka:latest
    container_name: broker-1
    ports:
      - 29092:9092
    environment:
      KAFKA_NODE_ID: 4
      KAFKA_PROCESS_ROLES: broker
      KAFKA_LISTENERS: 'PLAINTEXT://:19092,PLAINTEXT_HOST://:9092'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://broker-1:19092,PLAINTEXT_HOST://localhost:29092'
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@controller-1:9093,2@controller-2:9093,3@controller-3:9093
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    depends_on:
      - controller-1
      - controller-2
      - controller-3
    networks:
      - track_nest

  broker-2:
    image: apache/kafka:latest
    container_name: broker-2
    ports:
      - 39092:9092
    environment:
      KAFKA_NODE_ID: 5
      KAFKA_PROCESS_ROLES: broker
      KAFKA_LISTENERS: 'PLAINTEXT://:19092,PLAINTEXT_HOST://:9092'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://broker-2:19092,PLAINTEXT_HOST://localhost:39092'
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@controller-1:9093,2@controller-2:9093,3@controller-3:9093
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    depends_on:
      - controller-1
      - controller-2
      - controller-3
    networks:
      - track_nest

  broker-3:
    image: apache/kafka:latest
    container_name: broker-3
    ports:
      - 49092:9092
    environment:
      KAFKA_NODE_ID: 6
      KAFKA_PROCESS_ROLES: broker
      KAFKA_LISTENERS: 'PLAINTEXT://:19092,PLAINTEXT_HOST://:9092'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://broker-3:19092,PLAINTEXT_HOST://localhost:49092'
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@controller-1:9093,2@controller-2:9093,3@controller-3:9093
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    depends_on:
      - controller-1
      - controller-2
      - controller-3
    networks:
      - track_nest

  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - track_nest

  minio:
    <<: *minio-common
    hostname: minio
    volumes:
      - minio-1:/data1
      - minio-2:/data2
    ports:
      - "9000:9000"
      - "9001:9001"

  envoy:
    image: envoyproxy/envoy:v1.36-latest
    container_name: envoy
    ports:
      - "8800:8800"     # gRPC-Web / RN clients connect here
      - "9901:9901"     # admin (optional)
    volumes:
      - ./envoy/envoy.yaml:/etc/envoy/envoy.yaml:ro
    networks:
      - track_nest
    depends_on:
      - emergency_ops
      - user_tracking
      - criminal_reports
      - intel_core
      - keycloak

  nginx:
    image: nginx:stable-alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - track_nest
    depends_on:
      - keycloak
      - web

  criminal_reports:
    build:
      context: ../service/criminal-reports
      dockerfile: Dockerfile
    container_name: criminal_reports
    ports:
      - "38080:38080"
    environment:
      KAFKA_SERVER: "broker-1:19092,broker-2:19092,broker-3:19092"
      REDIS_URL: "redis://redis:6379"
      DB_HOST: "criminal_reports_postgres"
      DB_PORT: 5432
      DB_NAME: "tracknest"
      DB_USERNAME: "tracknestadmin"
      DB_PASSWORD: "tracknestadmin"
      MINIO_ENDPOINT: "http://minio:9000"
      MINIO_ACCESS_KEY: "minioadmin"
      MINIO_SECRET_KEY: "minioadmin"
      ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:38080"
    networks:
      - track_nest
      - default
    depends_on:
      - criminal_reports_postgres
      - minio

  emergency_ops:
    build:
      context: ../service/emergency-ops
      dockerfile: Dockerfile
    container_name: emergency_ops
    ports:
      - "28080:28080"
    environment:
      KAFKA_SERVER: "broker-1:19092,broker-2:19092,broker-3:19092"
      REDIS_URL: "redis://redis:6379"
      DB_HOST: "emergency_ops_postgres"
      DB_PORT: 5432
      DB_NAME: "tracknest"
      DB_USERNAME: "tracknestadmin"
      DB_PASSWORD: "tracknestadmin"
      KEYCLOAK_AUTH_SERVER_URL: "http://keycloak:8080/auth"
      KEYCLOAK_CLIENT_ID: "emergency-operations"
      KEYCLOAK_CLIENT_SECRET: "2Bu3haFOwsOW7ONprnSGnmVoU8SvHLmy"
      KEYCLOAK_PUBLIC_REALM: "public-dev"
      ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:28080"
    networks:
      - track_nest
    depends_on:
      - emergency_ops_postgres

  user_tracking:
    build:
      context: ../service/user-tracking
      dockerfile: Dockerfile
    container_name: user_tracking
    ports:
      - "19090:19090"
    environment:
      KAFKA_SERVER: "broker-1:19092,broker-2:19092,broker-3:19092"
      REDIS_URL: "redis://redis:6379"
      DB_HOST: "user_tracking_postgres"
      DB_PORT: 5432
      DB_NAME: "tracknest"
      DB_USERNAME: "tracknestadmin"
      DB_PASSWORD: "tracknestadmin"
      ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:18080"
    networks:
      - track_nest
    depends_on:
      - user_tracking_postgres

  intel_core:
    build:
      context: ../service/intel-core
      dockerfile: Dockerfile
    container_name: intel_core
    ports:
      - "48000:48000"
    networks:
      - track_nest
    depends_on:
      - intel_core_postgres
 
  user_tracking_postgres:
    image: timescale/timescaledb-ha:pg17
    container_name: user_tracking_postgres
    environment:
      POSTGRES_USER: tracknestadmin
      POSTGRES_PASSWORD: tracknestadmin
      POSTGRES_DB: tracknest
    ports:
      - "15432:5432"
    volumes:
      - user_tracking_postgres_data:/var/lib/postgresql/data
      - ../database/01-user-tracking-init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ../database/02-user-tracking-seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
      - ../database/tables_postgres.sql:/docker-entrypoint-initdb.d/03-quartz.sql
    networks:
      - track_nest
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tracknestadmin -d tracknest"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  emergency_ops_postgres:
    image: timescale/timescaledb-ha:pg17
    container_name: emergency_ops_postgres
    environment:
      POSTGRES_USER: tracknestadmin
      POSTGRES_PASSWORD: tracknestadmin
      POSTGRES_DB: tracknest
    ports:
      - "25432:5432"
    volumes:
      - emergency_ops_postgres_data:/var/lib/postgresql/data
      - ../database/01-emergency-ops-init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ../database/02-emergency-ops-seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    networks:
      - track_nest
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tracknestadmin -d tracknest"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  criminal_reports_postgres:
    image: timescale/timescaledb-ha:pg17
    container_name: criminal_reports_postgres
    environment:
      POSTGRES_USER: tracknestadmin
      POSTGRES_PASSWORD: tracknestadmin
      POSTGRES_DB: tracknest
    ports:
      - "35432:5432"
    volumes:
      - criminal_reports_postgres_data:/var/lib/postgresql/data
      - ../database/01-criminal-reports-init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ../database/02-criminal-reports-seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    networks:
      - track_nest
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tracknestadmin -d tracknest"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
  
  keycloak_postgres:
    image: postgres:latest
    container_name: keycloak_postgres
    environment:
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
      POSTGRES_DB: keycloak
    ports:
      - "5432:5432"
    volumes:
      - keycloak_postgres_data:/var/lib/postgresql
    networks:
      - track_nest
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  keycloak:
    build:
      context: ../keycloak
      dockerfile: Dockerfile
    container_name: keycloak
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak_postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KC_HOSTNAME_STRICT_HTTPS: 'false'
      KC_HEALTH_ENABLED: true
      KC_METRICS_ENABLED: true
      KC_HTTP_RELATIVE_PATH: /auth
      KC_PROXY: edge
    command: start-dev --import-realm 
    volumes:
    - ../keycloak/public-dev.json:/opt/keycloak/data/import/public-dev.json
    - ../keycloak/restricted-dev.json:/opt/keycloak/data/import/restricted-dev.json
    networks:
      - track_nest
    expose:
      - "8080"
      - "9000"
    depends_on:
      keycloak_postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  web:
    build:
      context: ../frontend/track-nets-web
      dockerfile: Dockerfile
    container_name: web
    environment:
      - NODE_ENV=production
    ports:
      - "3000:3000"
    networks:
      - track_nest

networks:
  track_nest:
    driver: bridge

volumes:
  user_tracking_postgres_data:
  emergency_ops_postgres_data:
  criminal_reports_postgres_data:
  emergency_detection_postgres_data:
  intel_core_postgres_data:
  keycloak_postgres_data:
  redis-data:
  minio-1:
  minio-2: